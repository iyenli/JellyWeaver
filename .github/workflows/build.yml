name: Build

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python deps
        run: pip install -e .[dev]

      - name: Package with PyInstaller
        run: pyinstaller jelly-weaver.spec

      - uses: actions/upload-artifact@v4
        with:
          name: jelly-weaver-win
          path: dist/jelly-weaver.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python deps
        run: pip install -e .[dev]

      - name: Package with PyInstaller
        run: pyinstaller jelly-weaver.spec

      - uses: actions/upload-artifact@v4
        with:
          name: jelly-weaver-macos
          path: dist/jelly-weaver
